name: Med Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'       # Weekdays 4:00 AM ET
    - cron: '30 20 * * 1-5'     # Weekdays 4:30 PM ET
    - cron: '0 22 * * 1-5'      # Weekdays 6:00 PM ET
    - cron: '0 0 * * 2-6'       # Weekdays 8:00 PM ET
    - cron: '30 13 * * 0,6'     # Weekends 9:30 AM ET
    - cron: '30 16 * * 0,6'     # Weekends 12:30 PM ET
    - cron: '30 19 * * 0,6'     # Weekends 3:30 PM ET
    - cron: '30 22 * * 0,6'     # Weekends 6:30 PM ET
    - cron: '0 1 * * 0,1'       # Weekends 9:00 PM ET

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-meds
        run: |
          curl -X GET "https://bp-reminder-4383.twil.io/check-meds"
