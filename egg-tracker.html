<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Egg Watch</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial;
background:#f5c57a;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.tabs{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.tab{
padding:15px 30px;
border-radius:20px;
border:3px solid black;
background:white;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:#7da6ff;
color:white;
}

.content{
background:white;
padding:30px;
border-radius:25px;
border:4px solid black;
}

.day{
font-size:30px;
font-weight:bold;
margin-bottom:20px;
}

.emoji{
font-size:80px;
}

.stat{
margin:10px;
font-weight:bold;
}

.info{
background:#fff4c5;
padding:15px;
border-radius:15px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🥚 Egg Watch</h1>
<p>Growing Baby Birds!</p>

<div class="tabs">
<div class="tab active" onclick="showTab('ducks')">🦆 Ducks</div>
<div class="tab" onclick="showTab('geese')">🪿 Geese</div>
</div>

<div id="ducks-content" class="content">
Loading duck data...
</div>

<div id="geese-content" class="content" style="display:none">
Loading goose data...
</div>

</div>


<script>

/* SUPABASE SETTINGS */

const SUPABASE_URL="https://jzpipxvxrtdhmsdkveog.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cGlweHZ4cnRkaG1zZGt2ZW9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NTE1MjUsImV4cCI6MjA4NTMyNzUyNX0.7mm0ts91y0leGKLFCgRk6KJitah3V5WJZdiD_gHL57o"

/* IMPORTANT: avoid naming conflict */
const sb = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)


/* INCUBATION STAGES */

const duckStages={
0:{emoji:"🥚",desc:"Egg just started"},
3:{emoji:"❤️",desc:"Heart beating"},
7:{emoji:"👁",desc:"Eyes forming"},
14:{emoji:"🐣",desc:"Feathers growing"},
25:{emoji:"⚠️",desc:"Lockdown begins"},
28:{emoji:"🦆",desc:"Hatch day!"}
}

const gooseStages={
0:{emoji:"🥚",desc:"Egg just started"},
5:{emoji:"❤️",desc:"Heart beating"},
10:{emoji:"👁",desc:"Eyes forming"},
18:{emoji:"🐣",desc:"Feathers growing"},
27:{emoji:"⚠️",desc:"Lockdown begins"},
30:{emoji:"🪿",desc:"Hatch day!"}
}


/* DATE CALCULATION */

function getDay(start){

const today=new Date()
today.setHours(0,0,0,0)

const startDate=new Date(start)
startDate.setHours(0,0,0,0)

return Math.floor((today-startDate)/86400000)

}


/* STAGE FINDER */

function getStage(day,stages){

let keys=Object.keys(stages).map(Number).sort((a,b)=>a-b)

let current=keys[0]

for(let k of keys){
if(day>=k){current=k}
}

return stages[current]

}


/* LOAD DATA */

async function loadData(){

try{

let {data,error}=await sb.from("egg_batches").select("*")

if(error){
console.error(error)
alert("Database error. Check console.")
return
}

let duck=data.find(x=>x.type==="ducks")
let goose=data.find(x=>x.type==="geese")

if(duck){
render("ducks",duck,duckStages)
}

if(goose){
render("geese",goose,gooseStages)
}

}catch(err){

console.error(err)

}

}


/* RENDER VIEW */

function render(type,data,stages){

const day=getDay(data.start_date)

const stage=getStage(day,stages)

let hatch=new Date(data.start_date)
hatch.setDate(hatch.getDate()+data.incubation_days)

let html=`

<div class="day">Day ${day}</div>

<div class="emoji">${stage.emoji}</div>

<div class="stat">${data.egg_count} eggs</div>

<div class="info">${stage.desc}</div>

<div class="info">
Hatch date around:<br>
<b>${hatch.toDateString()}</b>
</div>

`

document.getElementById(type+"-content").innerHTML=html

}


/* TAB SWITCH */

function showTab(tab){

document.getElementById("ducks-content").style.display="none"
document.getElementById("geese-content").style.display="none"

document.getElementById(tab+"-content").style.display="block"

let tabs=document.querySelectorAll(".tab")

tabs.forEach(t=>t.classList.remove("active"))

if(tab==="ducks"){tabs[0].classList.add("active")}
if(tab==="geese"){tabs[1].classList.add("active")}

}


/* INIT */

window.onload=()=>{

loadData()

}

</script>

</body>
</html>
