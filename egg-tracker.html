<script>

/* SUPABASE */

const SUPABASE_URL="https://jzpipxvxrtdhmsdkveog.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6cGlweHZ4cnRkaG1zZGt2ZW9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NTE1MjUsImV4cCI6MjA4NTMyNzUyNX0.7mm0ts91y0leGKLFCgRk6KJitah3V5WJZdiD_gHL57o"

const sb = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* DUCK STAGES */

const duckStages={
0:{emoji:"🥚",desc:"Egg just started"},
2:{emoji:"🫀",desc:"Tiny heart forming"},
4:{emoji:"❤️",desc:"Heart beating"},
7:{emoji:"👁",desc:"Eyes forming — good candling day"},
10:{emoji:"🐤",desc:"Beak developing"},
14:{emoji:"🐣",desc:"Feathers starting"},
18:{emoji:"🐥",desc:"Duckling moving"},
25:{emoji:"⚠️",desc:"Lockdown begins"},
28:{emoji:"🦆",desc:"Hatch day!"}
}

/* GOOSE STAGES */

const gooseStages={
0:{emoji:"🥚",desc:"Egg just started"},
3:{emoji:"❤️",desc:"Heart beating"},
7:{emoji:"👁",desc:"Eyes forming"},
14:{emoji:"🐣",desc:"Feathers growing"},
21:{emoji:"🐥",desc:"Gosling moving"},
27:{emoji:"⚠️",desc:"Lockdown begins"},
30:{emoji:"🪿",desc:"Hatch day!"}
}

/* CALCULATE DAY */

function getDay(start){

const today=new Date()
today.setHours(0,0,0,0)

const startDate=new Date(start)
startDate.setHours(0,0,0,0)

return Math.floor((today-startDate)/86400000)

}

/* GET STAGE */

function getStage(day,stages){

let keys=Object.keys(stages).map(Number).sort((a,b)=>a-b)

let current=keys[0]

for(let k of keys){
if(day>=k) current=k
}

return stages[current]

}

/* LOAD DATA */

async function loadData(){

let {data,error}=await sb.from("egg_batches").select("*")

if(error){
console.error(error)
return
}

let duck=data.find(x=>x.type==="ducks")
let goose=data.find(x=>x.type==="geese")

if(duck) render("ducks",duck,duckStages)
if(goose) render("geese",goose,gooseStages)

}

/* RENDER */

function render(type,data,stages){

let day=getDay(data.start_date)
let stage=getStage(day,stages)

let hatch=new Date(data.start_date)
hatch.setDate(hatch.getDate()+data.incubation_days)

let html=`

<div class="day">Day ${day}</div>

<div class="emoji">${stage.emoji}</div>

<div class="info">${stage.desc}</div>

<div class="info">
${data.egg_count} eggs
</div>

<div class="info">
Hatch around: <b>${hatch.toDateString()}</b>
</div>

`

document.getElementById(type+"-content").innerHTML=html

}

/* ADMIN ADD */

async function addEggBatch(){

let type=document.getElementById("egg-type").value
let start=document.getElementById("egg-start").value
let count=parseInt(document.getElementById("egg-count").value)

let incubation=type==="ducks"?28:30

let {error}=await sb.from("egg_batches").upsert({
type:type,
start_date:start,
egg_count:count,
incubation_days:incubation
})

if(error){
alert(error.message)
return
}

alert("Egg batch saved!")

loadData()

}

/* TABS */

function showTab(tab){

document.getElementById("ducks-content").style.display="none"
document.getElementById("geese-content").style.display="none"
document.getElementById("admin-content").style.display="none"

document.getElementById(tab+"-content").style.display="block"

let tabs=document.querySelectorAll(".tab")
tabs.forEach(t=>t.classList.remove("active"))

if(tab==="ducks") tabs[0].classList.add("active")
if(tab==="geese") tabs[1].classList.add("active")
if(tab==="admin") tabs[2].classList.add("active")

}

/* QR CODES */

function generateQR(){

let base=window.location.origin+window.location.pathname

new QRCode(document.getElementById("duckQR"),{
text:base+"?view=ducks",
width:120,
height:120
})

new QRCode(document.getElementById("gooseQR"),{
text:base+"?view=geese",
width:120,
height:120
})

}

/* INIT */

window.onload=()=>{

loadData()

generateQR()

}

</script>

</body>
</html>
